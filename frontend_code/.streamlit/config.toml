[theme]
# The primary accent color for interactive elements (buttons, sliders, links)
# Using a sleek, modern Indigo
primaryColor="#6366f1"

# The main background color for the application
# Using a deep, premium slate/navy
backgroundColor="#0f172a"

# The background color for the application
# Using a deep, premium slate/navy
secondaryBackgroundColor="#1e293b"

# The main text color
# A crisp, soft off-white for high readability
textColor="#f8fafc"

# The font family (among sans serif, serif and monospace)
font="sans serif"

[client]
# This prevents Streamlit from showing the "Deploy" button in the top right corner
# which makes the app feel more like a custom platform rather than a script
toolbarMode="viewer"

