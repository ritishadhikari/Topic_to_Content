version: '3.8'

services:
  # FastAPI Application
  api:
    build:  .
    container_name: khudse_backend
    ports: 
      - "8991:8000"
    volumes:
      - ./tests:/app/tests
    env_file:
      - .env
    environment:
      # Overwrites the MONGO_URI from the .env
      # API talks to the local mongo db container
      - MONGO_URI=mongodb://mongodb:27017/?replicaSet=rs0
    depends_on:
      - mongodb
    networks:
      - khudse_network

  # Streamlit Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.streamlit 
    container_name: khudse_frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
      - mongodb
    networks:
      - khudse_network
    


  # Local MongoDB Database
  mongodb:
    image: mongo:latest
    container_name: kudse_db
    command: ['--replSet',"rs0","--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - khudse_network

volumes:
  mongo_data:

# Creating Private LAN just for the containers
networks:
  khudse_network:
    driver: bridge
