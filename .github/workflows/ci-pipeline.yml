name: Backend CI Pipeline

on: 
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"  # Speeds up future runs by caching dependencies
      
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
      
    - name: Check Syntax & Imports
      run: |
        python -c "from backend_code.database import lifespan; from backend_code.routers import authentication, course_generate; print("All Modueles imported successfully")"

