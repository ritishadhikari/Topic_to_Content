# CI Pipeline
name: Backend CI Pipeline

on: 
  push:
    branches:
      - main
  pull_request:
    branches: 
      - main

jobs:

  test:
    
    runs-on: ubuntu-latest

    
    # Provide dummy environment variables for the test suite
    env:
      MONGO_URI: "mongodb://localhost:27017/?replicaSet=rs0"
      JWT_SECRET_KEY: test-secret-key-123
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 120
      MCP_USER: default_test_user
      GOOGLE_API_KEY: sk-dummy-key
      BRAVE_SEARCH_API_KEY: dummmy-key
      GEMINI_API_KEY: sk-dummy-key
      TAVILY_API_KEY: tvly-dummy-key
      SERPER_API_KEY: dummy-serper-key

    steps:

      - name: Checkout Code Repository
        uses: actions/checkout@v4


      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      
      
      - name: Start MongoDB Replica Set Container
        run: |
          docker run --rm -d -p 27017:27017 --name mongodb mongo:latest --replSet rs0 --bind_ip_all
          sleep 3
        
      - name: Initialize MongoDB Replica Set
        run: |
          docker exec mongodb mongosh --eval "rs.initiate({_id:'rs0', members:[{_id:0, host:'localhost:27017'}]})"
          sleep 3

      - name: Install Application Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run Pytest
        run: |
          pytest -v
  
  build-and-push:
    needs: test     # waits for the test to pass
    runs-on: ubuntu-latest

    # Only Push images when code is merged directly into the main branch
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set lowercase repository name
        run: |
          echo "REPO=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Login to the Github container registry
        uses: docker/login-action@v3
        with: 
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata (tags, labels) for API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REPO }}-api
          tags: |

            # 1. Tag with the short Git commit SHA (e.g., :sha-8a7c2f0)
            type=sha

            # 2. Add the :latest tag ONLY if pushing to the main branch
            type=raw,value=latest,enable={{is_default_branch}}

      # Build and Push the FastAPI backend
      - name: Build and push FastAPI Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}

      - name: Extract metadata (tags, labels) for MCP
        id: meta-mcp
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REPO }}-mcp
          tags: |

            # 1. Tag with the short Git commit SHA (e.g., :sha-8a7c2f0)
            type=sha

            # 2. Add the :latest tag ONLY if pushing to the main branch
            type=raw,value=latest,enable={{is_default_branch}}

      # Build and Push the FastMCP Server
      - name: Build and Push FastMCP Server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.mcp
          push: true
          tags: ${{ steps.meta-mcp.outputs.tags }}
          labels: ${{ steps.meta-mcp.outputs.labels }}

      - name: Extract metadata (tags, labels) for MCP
        id: meta-ui
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REPO }}-ui
          tags: |

            # 1. Tag with the short Git commit SHA (e.g., :sha-8a7c2f0)
            type=sha

            # 2. Add the :latest tag ONLY if pushing to the main branch
            type=raw,value=latest,enable={{is_default_branch}}
      
      # Build and Push the FastMCP Server
      - name: Build and Push Streamlit UI Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.streamlit
          push: true
          tags: ${{ steps.meta-ui.outputs.tags }}
          labels: ${{ steps.meta-ui.outputs.labels }}