name: Backend CI Pipeline

on: 

  pull_request:
    branches: 
      - main

jobs:

  test:
    
    runs-on: ubuntu-latest

    # Spin up a live mongodb container for our hybrid mocks to query
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
    
    # Provide dummy environment variables for the test suite
    env:
      MONGO_URI: mongodb://localhost:27017
      JWT_SECRET_KEY: test-secret-key-123
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 120
      MCP_USER: default_test_user
      OPENAI_API_KEY: sk-dummy-key
      TAVILY_API_KEY: tvly-dummy-key

    steps:

      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run Pytest
        run: |
          pytest -v
  
  build-and-push:
    needs: test     # waits for the test to pass
    runs-on: ubuntu-latest

    # Only Push images when code is merged directly into the main branch
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Login to the Github container registry
        uses: docker/login-action@v3
        with: 
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
      
      # Build and Push the FastAPI backend
      - name: Build and push FastAPI Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}-api:latest
          labels: ${{ steps.meta.outputs.labels }}
      
      # Build and Push the FastMCP Server
      - name: Build and Push FastMCP Server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.mcp
          push: true
          tags: ghcr.io/${{ github.repository }}-mcp:latest
          labels: ${{ steps.meta.outputs.labels }}