# CI Pipeline
name: Backend CI Pipeline

on: 
  push:
    branches:
      - main
  pull_request:
    branches: 
      - main

jobs:

  test:
    
    runs-on: ubuntu-latest

    
    # Provide dummy environment variables for the test suite
    env:
      MONGO_URI: mongodb://localhost:27017
      JWT_SECRET_KEY: test-secret-key-123
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 120
      MCP_USER: default_test_user
      GOOGLE_API_KEY: sk-dummy-key
      GEMINI_API_KEY: sk-dummy-key
      TAVILY_API_KEY: tvly-dummy-key
      SERPER_API_KEY: dummy-serper-key

    steps:

      - name: Checkout Code Repository
        uses: actions/checkout@v4


      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      
      
      - name: Start MongoDB Replica Set Container
        run: |
          docker run --rm -d -p 27017:27017 --name mongodb mongo:latest --replSet rs0 --bind_ip_all
          sleep 3
        
      - name: Initialize MongoDB Replica Set
        run: |
          docker exec mongodb mongosh --eval "rs.initiate({_id:'rs0', members:[{_id:0, host:'localhost:27017'}]})"
          sleep 3

      - name: Install Application Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run Pytest
        env:
          MONGO_URI: "mongodb://localhost:27017/?replicaSet=rs0"
        run: |
          pytest -v
  
  build-and-push:
    needs: test     # waits for the test to pass
    runs-on: ubuntu-latest

    # Only Push images when code is merged directly into the main branch
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Set lowercase repository name
        run: |
          echo "REPO=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Login to the Github container registry
        uses: docker/login-action@v3
        with: 
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.REPO }}
      
      # Build and Push the FastAPI backend
      - name: Build and push FastAPI Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO }}-api:latest
          labels: ${{ steps.meta.outputs.labels }}
      
      # Build and Push the FastMCP Server
      - name: Build and Push FastMCP Server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.mcp
          push: true
          tags: ghcr.io/${{ env.REPO }}-mcp:latest
          labels: ${{ steps.meta.outputs.labels }}