apiVersion: v1
kind: Service
metadata:
  name: api  # name of the service
  labels:
    app: api  # the service monitor looks for this label
spec:
  selector:
    app: api  # the pod with the name - api will be contacted
  ports:
    - protocol: TCP
      name: http-metrics  # naming the port so that prometheus knows which pod to scrape
      port: 8000
      targetPort: 8000

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: backend-api
        image: ghcr.io/ritishadhikari/topic_to_content-api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: backend-credentials