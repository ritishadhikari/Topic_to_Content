apiVersion: v1
kind: Service
metadata: 
  name: frontend
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 8501
      targetPort: 8501
  
---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector: 
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/ritishadhikari/topic_to_content-ui:latest
          ports:
            - containerPort: 8501
          env:
          - name: API_URL
            value: "http://api:8000"