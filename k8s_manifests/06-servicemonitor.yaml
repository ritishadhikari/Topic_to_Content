apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata: 
  name: backend-api-monitor
  namespace: monitoring
  labels:
    release: khudse-backend-monitor  # tells the prometheus engine to read it's instructions
spec:
  # look into the default namespace
  namespaceSelector:
    matchNames:
      - default
  selector:
    matchExpressions:
      # app: api
      - {key: app, operator: In, values: [api, api-canary]}
  endpoints:
    - port: http-metrics
      path: /metrics
      interval: 15s  # scrape frequency
