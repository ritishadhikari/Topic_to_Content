apiVersion: networking.k8s.io/v1
kind: Ingress
metadata: 
  name: khudse-ingress
  annotations:
    # explicitly telling K3s to use its built-in Traefik proxy
    ingressClassName: "traefik"
spec: 
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix  # alternate is EXACT
        backend: 
          service:
            name: frontend
            port:
              number: 8501
