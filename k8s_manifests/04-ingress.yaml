#   annotations:
#     # explicitly telling K3s to use its built-in Traefik proxy
#     ingressClassName: "traefik"
#     # this annotation will trigger cert-manager to issue an https certificate from the letsencrypt website
#     cert-manager.io/cluster-issuer: "letsencrypt-prod"
# spec: 
#   tls:
#   - hosts:
#         # Tells the ingress to generate an HTTPS certificate for this specific domain
#       - khudse.duckdns.org  
#     # Cert Manager will safely store the keys in this secret0
#     secretName: khudse-frontend-tls  
#   rules:
#     # be very specific to the domain name
