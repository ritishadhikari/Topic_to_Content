apiVersion: networking.k8s.io/v1
kind: Ingress
metadata: 
  name: khudse-ingress
  annotations:
    # explicitly telling K3s to use its built-in Traefik proxy
    ingressClassName: "traefik"
spec: 
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix  # alternate is EXACT
        backend: 
          service:
            name: frontend
            port:
              number: 8501

---

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: monitoring  # must live in the same namespace as the engine
  annotations:
    ingressClassName: "traefik"
spec:
  rules:
  # Using a wildcard DNS routing trick for AWS EC2 testing
  - host: grafana.3.7.249.2.nip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: khudse-backend-monitor-grafana
            port:
              number: 80